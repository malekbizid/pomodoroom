<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Chill Room</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <main class="chill-background">  
        <h1>Pomodoro Chill Room</h1>
        <div class="timer-card">
            <p id="mode-label">Work Session</p>
            <h1 id="time-display">25:00</h1>
            <div class="controls">
                <button id="start-btn">Start</button>
                <button id="pause-btn">Pause</button>
                <button id="reset-btn">Reset</button>
            </div>
        </div>
        <audio controls autoplay class="audio-player">
            <source src="/audio/watermello-lofi-girl-chill.mp3" type="audio/mpeg">
        </audio>
    </main>
    <script src="app.js"></script>
</body>
</html>
