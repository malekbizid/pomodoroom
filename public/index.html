<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Chill Room</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <main class="chill-background">  
        <div id="control-tab">
            <div class="control-btn" id="fullscreen-btn">
                <img src="./icons/expand.png" alt="expand" id="expand-icon">
                <img src="./icons/reduce.png" alt="reduce" id="shrink-icon">
            </div>
            <div class="control-btn">
                <img src="./icons/full-screen.png" alt="expand">
            </div>
            <div class="control-btn">
                <img src="./icons/reduce.png" alt="expand">
            </div>
            <div class="control-btn">
                <img src="./icons/upload-icon.png" alt="expand">
            </div>
        </div>
        <div class="room-title">Pomodoro Chill Room</div>
        <div class="timer-card">
            <p id="mode-label">Work Session</p>
            <h1 id="time-display">25:00</h1>
            <div class="controls">
                <button id="start-btn">Start</button>
                <button id="pause-btn">Pause</button>
                <button id="reset-btn">Reset</button>
            </div>
        </div>
        <audio controls autoplay class="audio-player">
            <source src="/audio/watermello-lofi-girl-chill.mp3" type="audio/mpeg">
        </audio>
    </main>

    <div class="gallery-container">
        <div class="gallery">
            <div class="gallery-item" data-image="./images/lofi-sunset.jpg">
                <img src="./images/lofi-sunset.jpg" alt="Lofi Sunset">
            </div>
            <div class="gallery-item" data-image="./images/lofi-girl.jpg">
                <img src="./images/lofi-girl.jpg" alt="Lofi Girl">
            </div>
            <div class="gallery-item" data-image="./images/lofi-room.jpg">
                <img src="./images/lofi-room.jpg" alt="Lofi Room">
            </div>
            <div class="gallery-item" id="upload-image">
                <img src="./icons/upload-icon-2.png" alt="upload image">
            </div>
        </div>
    </div>

    <input type="file" id="backgroundFileInput" accept="image/*" style="display: none;">

    <div class="chat-container">
        <div class="chat-header">Lofi Chat</div>
        <div id="chat-messages">
            </div>
        <form id="chat-form">
            <input type="text" id="chat-input" autocomplete="off" placeholder="Écris un message..." />
            <button type="submit">Envoyer</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
