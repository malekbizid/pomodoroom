<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoroom</title>
    <link rel="icon" type="image/jpg" href="images/lofi.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="top-bar">
        <div class="top-left">
            <span id="listening-now">listening now 0 <span class="dot">•</span></span>
        </div>
        <div class="top-right">
            <div class="control-btn" id="fullscreen-btn">
                <img src="./icons/icon-expand.png" alt="expand" id="expand-icon">
                <img src="./icons/icon-compress.png" alt="compress" id="shrink-icon">
            </div>
            <div class="control-btn" id="timer-toggle-btn">
                <img src="./icons/icon-timer.png" alt="timer">
            </div>
            <button class="logout-btn" id="logout-btn">logout</button>
        </div>
    </div>

    <div class="scene" id="scene">

        <video id="bg-video" loop muted playsinline></video>

        <div class="timer-card" id="timer-card" style="display:none;">
            <p id="mode-label">WORK</p>
            <div class="timer-display-row">
                <span id="work-time">25:00</span>
                <span id="pause-time">+5:00</span>
            </div>
            <div class="controls">
                <button id="start-btn">start</button>
                <button id="pause-btn">pause</button>
                <button id="reset-btn">reset</button>
            </div>
        </div>

        <div class="todo-container">
            <div class="panel-header" id="todo-header">to-do <span class="chevron">▼</span></div>
            <ul id="todo-list"></ul>
            <form id="todo-form">
                <input type="text" id="todo-input" autocomplete="off" placeholder="new task...">
                <button type="submit">+</button>
            </form>
        </div>

        <div class="chat-container">
            <div class="panel-header" id="chat-header">chat <span class="chevron">▼</span></div>
            <div id="chat-messages"></div>
            <form id="chat-form">
                <input type="text" id="chat-input" autocomplete="off" placeholder="message...">
                <button type="submit">→</button>
            </form>
        </div>

        <div class="gallery-container">
            <div class="gallery">
                <div class="gallery-item active" data-image="./images/lofi-sunset.jpg">
                    <img src="./images/lofi-sunset.jpg" alt="Lofi Sunset">
                </div>
                <div class="gallery-item" data-image="./images/lofi-girl.jpg">
                    <img src="./images/lofi-girl.jpg" alt="Lofi Girl">
                </div>
                <div class="gallery-item" data-image="./images/lofi-room.jpg">
                    <img src="./images/lofi-room.jpg" alt="Lofi Room">
                </div>
                <div class="gallery-item" data-video="./videos/chill-room.mp4">
                    <video src="./videos/chill-room.mp4" muted preload="metadata"></video>
                </div>
                <div class="gallery-item" data-video="./videos/rain-loop.mp4">
                    <video src="./videos/rain-loop.mp4" muted preload="metadata"></video>
                </div>
                <div class="gallery-item" data-video="./videos/lofi1.mp4">
                    <video src="./videos/lofi1.mp4" muted preload="metadata"></video>
                </div>
                <div class="gallery-item" data-video="./videos/lofi2.mp4">
                    <video src="./videos/lofi2.mp4" muted preload="metadata"></video>
                </div>
                <div class="gallery-item" data-video="./videos/lofi3.mp4">
                    <video src="./videos/lofi3.mp4" muted preload="metadata"></video>
                </div>
                <div class="gallery-item" data-video="./videos/lofi4.mp4">
                    <video src="./videos/lofi4.mp4" muted preload="metadata"></video>
                </div>
                <div class="gallery-item" data-video="./videos/lofi5.mp4">
                    <video src="./videos/lofi5.mp4" muted preload="metadata"></video>
                </div>
                <div class="gallery-item" data-video="./videos/lofi6.mp4">
                    <video src="./videos/lofi6.mp4" muted preload="metadata"></video>
                </div>
                <div class="gallery-item" data-video="./videos/lofi7.mp4">
                    <video src="./videos/lofi7.mp4" muted preload="metadata"></video>
                </div>
                <div class="gallery-item" id="upload-image">
                    <img src="./icons/upload-icon-2.png" alt="upload">
                </div>
            </div>
        </div>

    </div>

    <div class="player-bar">
        <div class="player-controls">
            <button class="player-btn" id="prev-btn">⏮</button>
            <button class="player-btn" id="play-pause-btn">▶</button>
            <button class="player-btn" id="next-btn">⏭</button>
        </div>
        <div class="volume-viz" id="volume-viz">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
        </div>
        <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.01" value="0.7">
        <div class="player-track">
            <span id="track-title">lofi hip hop radio — beats to study / chill / relax</span>
        </div>
        <audio id="audio-element"></audio>
    </div>

    <input type="file" id="backgroundFileInput" accept="image/*" style="display:none;">

    <div id="auth-modal" class="modal-overlay">
        <div class="auth-card">
            <h2>pomodoroom</h2>
            <p id="auth-message"></p>
            <form id="auth-form">
                <input type="text" id="username" placeholder="username" autocomplete="off" required>
                <input type="password" id="password" placeholder="password" required>
                <div class="auth-controls">
                    <button type="submit" id="login-btn">login</button>
                    <button type="button" id="register-btn">register</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
