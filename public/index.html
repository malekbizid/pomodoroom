<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Chill Room</title>
    <link rel="icon" type="image/jpg" href="images/lofi.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<button id="logout-btn" class="logout-btn">Se déconnecter</button>    
    <main class="chill-background">  
        <div id="control-tab">
            <div class="control-btn" id="fullscreen-btn">
                <img src="./icons/icon-expand.png" alt="expand" id="expand-icon">
                <img src="./icons/icon-compress.png" alt="compress" id="shrink-icon">
            </div>
            <div class="control-btn">
                <img src="./icons/icon-info.png" alt="info">
            </div>
            <div class="control-btn">
                <img src="./icons/icon-upload.png" alt="upload">
            </div>
            <div class="control-btn" id="timer-toggle-btn">
                <img src="./icons/icon-timer.png" alt="timer">
            </div>
        </div>

        <div class="room-title">Pomodoro Chill Room</div>
        <div class="timer-card" id="timer-card" style="display:none;">
            <p id="mode-label">WORK</p>
            <div class="timer-display-row">
                    <span id="work-time">25:00</span>
                    <span id="pause-time">+5:00</span>
                </div>
            <div class="controls">
                <button id="start-btn">Start</button>
                <button id="pause-btn">Pause</button>
                <button id="reset-btn" >Reset</button>
            </div>
        </div>
        <audio controls autoplay class="audio-player">
            <source src="/audio/watermello-lofi-girl-chill.mp3" type="audio/mpeg">
        </audio>
    </main>

    <div class="gallery-container">
        <div class="gallery">
            <div class="gallery-item" data-image="./images/lofi-sunset.jpg">
                <img src="./images/lofi-sunset.jpg" alt="Lofi Sunset">
            </div>
            <div class="gallery-item" data-image="./images/lofi-girl.jpg">
                <img src="./images/lofi-girl.jpg" alt="Lofi Girl">
            </div>
            <div class="gallery-item" data-image="./images/lofi-room.jpg">
                <img src="./images/lofi-room.jpg" alt="Lofi Room">
            </div>
            <div class="gallery-item" id="upload-image">
                <img src="./icons/upload-icon-2.png" alt="upload image">
            </div>
        </div>
    </div>

    <input type="file" id="backgroundFileInput" accept="image/*" style="display: none;">

<div class="todo-container">
        <div class="todo-header">To-Do List</div>
        <ul id="todo-list">
            </ul>
        <form id="todo-form">
            <input type="text" id="todo-input" autocomplete="off" placeholder="Nouvelle tâche..." required />
            <button type="submit">+</button>
        </form>
    </div>
    
    <div class="chat-container">
        <div class="chat-header">Lofi Chat</div>
        <div id="chat-messages">
            </div>
        <form id="chat-form">
            <input type="text" id="chat-input" autocomplete="off" placeholder="Écris un message..." />
            <button type="submit">Envoyer</button>
        </form>
    </div>

    <div id="auth-modal" class="modal-overlay">
        <div class="auth-card">
            <h2>Authentification</h2>
            <p id="auth-message"></p>
            
            <form id="auth-form">
                <input type="text" id="username" placeholder="Nom d'utilisateur" autocomplete="off" required>
                <input type="password" id="password" placeholder="Mot de passe" required>
                
                <div class="auth-controls">
                    <button type="submit" id="login-btn">Se connecter</button>
                    <button type="button" id="register-btn">S'inscrire</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
